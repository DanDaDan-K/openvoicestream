name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  local-gates:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: System libs (PortAudio for sounddevice + pyaudio in agent tests)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 portaudio19-dev

      - name: Install server deps (runtime + voxedge + test tools)
        # The product has no root pyproject.toml — runtime deps live in
        # server/requirements.txt and the voice library ships as the published
        # `voxedge` wheel (alpha). Install both into the system interpreter so
        # the import smoke + service tests below run with a real environment
        # instead of a bare `uv run` venv (which is why those steps used to fail
        # with ModuleNotFoundError: fastapi).
        run: |
          uv pip install --system -r server/requirements.txt
          uv pip install --system --prerelease=allow voxedge
          uv pip install --system pytest pytest-asyncio httpx

      - name: Shell syntax
        run: bash -n deploy/install.sh deploy/verify.sh deploy/jetson-release-highperf.sh

      - name: Docker compose config
        run: |
          docker compose -f deploy/docker-compose.yml config --quiet
          docker compose -f deploy/docker-compose.rk.yml config --quiet
          docker compose -f deploy/docker-compose.radxa.yml config --quiet
          docker compose -f deploy/docker-compose.rpi.yml config --quiet

      - name: Python compile gate
        run: |
          python -m py_compile \
            server/core/language.py \
            server/core/model_downloader.py \
            server/core/rk_artifacts.py \
            deploy/roundtrip_verify.py

      - name: server.main import smoke (catches Python-version regressions)
        run: python -c "from server.main import app; print('routes:', len(app.routes))"

      - name: Service unit tests
        run: |
          pytest \
            server/tests/test_tts_language.py \
            server/tests/test_profile_loader.py \
            server/tests/test_admin_auth.py \
            server/tests/test_tts_runtime.py \
            server/tests/test_admin_routes.py \
            server/tests/test_backend_manager.py \
            server/tests/test_backend_unload.py \
            server/tests/test_main_hot_swap.py

      # The agent package depends on voxedge via an editable uv source at
      # `../../voxedge` (a sibling of this repo — see agent/pyproject.toml
      # [tool.uv.sources]). voxedge lives in its own public repo and is not
      # checked out by default, so clone it next to the workspace before
      # `uv run pytest` triggers `uv sync` (otherwise: "Distribution not found
      # at .../voxedge"). Default branch tracks this repo's main.
      - name: Checkout voxedge (sibling for editable uv source)
        run: git clone --depth 1 https://github.com/suharvest/voxedge.git ../voxedge

      # The grasp / vision test modules import cv2, scipy, onnxruntime and pin,
      # which live in the agent's `rebot` optional extra (see pyproject.toml).
      # A plain `uv run pytest` only syncs base + dev deps, so those 12 modules
      # fail collection with `ModuleNotFoundError: No module named 'cv2'`.
      # Install the rebot extra so the vision-grasp suite runs.
      - name: Agent unit tests
        working-directory: agent
        run: uv run --extra rebot pytest tests --ignore=tests/e2e --ignore=tests/test_e2e_orin.py
