<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Seeed Local Voice · 实时字幕 / 同传</title>
<style>
  :root {
    --bg: #f3f7ec; --panel: #ffffff; --line: #e3ead4; --line-soft: #eef2e3;
    --ink: #1f2a17; --ink-soft: #6b7560; --ink-faint: #99a08e;
    --accent: #6fa83a; --accent-soft: #d9e9c2; --accent-ink: #355013;
    --partial: #9aa692; --bad: #c0392b; --warn: #b8861f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                 "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink); display: flex; flex-direction: column;
    height: 100vh; font-size: 15px; line-height: 1.55;
  }
  header.bar {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    padding: 12px 24px; border-bottom: 1px solid var(--line); background: var(--bg);
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-right: auto; }
  .brand .logo {
    width: 40px; height: 40px; background: var(--accent); color: #fff; font-weight: 700;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; letter-spacing: 0.5px;
  }
  .brand h1 { margin: 0; font-size: 16px; font-weight: 600; }
  .brand .sub { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

  .lang { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-soft); }
  select {
    font: inherit; font-size: 13px; padding: 6px 8px; border: 1px solid var(--line);
    border-radius: 8px; background: #fff; color: var(--ink); cursor: pointer;
  }
  #rec {
    font: inherit; font-weight: 600; font-size: 14px; padding: 9px 18px; border: none;
    border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
  }
  #rec.on { background: var(--bad); }
  #rec:disabled { opacity: .6; cursor: default; }
  #rec .ic { width: 10px; height: 10px; border-radius: 50%; background: #fff; }
  #rec.on .ic { border-radius: 2px; }

  .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ink-faint); }
  .dot.on { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .dot.off { background: var(--bad); }
  .dot.wait { background: var(--warn); }

  .cfg { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
         padding: 8px 24px; background: var(--line-soft); border-bottom: 1px solid var(--line);
         font-size: 12px; color: var(--ink-soft); }
  .cfg input { font: inherit; font-size: 12px; padding: 5px 8px; border: 1px solid var(--line);
               border-radius: 6px; background: #fff; color: var(--ink); }
  .cfg input.url { width: 340px; max-width: 46vw; }
  .cfg .lvl { width: 80px; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .cfg .lvl i { display: block; height: 100%; width: 0; background: var(--accent); }
  .cfg summary { cursor: pointer; }
  details.cfgwrap { border-bottom: 1px solid var(--line); }

  main { flex: 1; overflow-y: auto; padding: 22px 24px 40px; }
  .line {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 18px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(31,42,23,.03);
  }
  .line .src { font-size: 18px; color: var(--ink); }
  .line .tgt { font-size: 18px; color: var(--accent-ink); margin-top: 6px; font-weight: 500; }
  .line .meta { font-size: 11px; color: var(--ink-faint); margin-top: 8px; letter-spacing: .3px; }
  .same .tgt { display: none; }
  #current { border: 1px dashed var(--accent); background: #fbfdf6; position: sticky; bottom: 0; }
  #current.idle { opacity: .5; }
  #current .tgt.pending { color: var(--partial); font-style: italic; }
  .empty { color: var(--ink-faint); text-align: center; margin-top: 16%; font-size: 15px; }
</style>
</head>
<body>
  <header class="bar">
    <div class="brand">
      <div class="logo">SLV</div>
      <div>
        <h1>实时字幕 / 同传</h1>
        <div class="sub">Live Caption &amp; Interpretation</div>
      </div>
    </div>
    <div class="lang">
      <select id="srcLang" title="源语言（ASR 自动识别，此项用于翻译）">
        <option value="zho_Hans" selected>中文</option>
        <option value="eng_Latn">English</option>
        <option value="jpn_Jpan">日本語</option>
        <option value="kor_Hang">한국어</option>
        <option value="fra_Latn">Français</option>
        <option value="deu_Latn">Deutsch</option>
        <option value="spa_Latn">Español</option>
      </select>
      <span>→</span>
      <select id="tgtLang" title="目标语言">
        <option value="">— 仅转录 —</option>
        <option value="eng_Latn" selected>English</option>
        <option value="zho_Hans">中文</option>
        <option value="jpn_Jpan">日本語</option>
        <option value="kor_Hang">한국어</option>
        <option value="fra_Latn">Français</option>
        <option value="deu_Latn">Deutsch</option>
        <option value="spa_Latn">Español</option>
      </select>
    </div>
    <button id="rec"><span class="ic"></span><span id="recLabel">开始录音</span></button>
    <div class="status"><span id="dot" class="dot"></span><span id="statusText">未连接</span>
      <span id="counts" style="color:var(--ink-faint)"></span></div>
  </header>

  <details class="cfgwrap">
    <summary class="cfg" style="background:var(--bg);border:none">⚙ 服务地址</summary>
    <div class="cfg">
      <label>SLV ASR
        <input class="url" id="slvUrl" value="" placeholder="留空 = 经本机网关 /asr（绕过系统代理）" /></label>
      <label>翻译网关
        <input class="url" id="trUrl" value="" placeholder="留空 = 经本机网关 /translate" /></label>
      <span>音量</span><span class="lvl"><i id="lvl"></i></span>
    </div>
  </details>

  <main id="main">
    <div id="history"></div>
    <div id="current" class="line idle">
      <div class="src" id="curSrc"></div>
      <div class="tgt" id="curTgt"></div>
      <div class="meta" id="curMeta"></div>
    </div>
    <div id="empty" class="empty">点「开始录音」，对着麦克风说话即可看到字幕。</div>
  </main>

<script>
  const TARGET_SR = 16000;
  const $ = (id) => document.getElementById(id);
  const historyEl=$("history"), curEl=$("current"), curSrc=$("curSrc"), curTgt=$("curTgt"),
        curMeta=$("curMeta"), emptyEl=$("empty"), dot=$("dot"), statusText=$("statusText"),
        counts=$("counts"), recBtn=$("rec"), recLabel=$("recLabel"), lvl=$("lvl");

  let ws=null, recording=false, micStream=null, audioCtx=null, sourceNode=null, procNode=null;
  let reconnectTimer=null, wsOpenTs=0, lineCount=0, gotData=false, failCount=0;
  let curOriginal="", debounceTimer=null, lastTranslatedSrc="";
  // Client-side VAD (drives end_utterance so one WS spans the conversation).
  let vadSpeaking=false, vadSilenceMs=0, vadSpokeMs=0;
  const VAD_TH=0.03, VAD_SILENCE_MS=700, VAD_MIN_SPEECH_MS=300;
  function vadReset(){ vadSpeaking=false; vadSilenceMs=0; vadSpokeMs=0; }

  function setStatus(s, t){ dot.className="dot"+(s?" "+s:""); statusText.textContent=t; }
  function esc(s){ const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }
  function scrollDown(){ $("main").scrollTop=$("main").scrollHeight; }
  const srcLang=()=>$("srcLang").value, tgtLang=()=>$("tgtLang").value;

  async function translate(text){
    const tgt=tgtLang();
    if(!tgt || !text.trim()) return "";          // 仅转录 or empty
    // Empty = same-origin gateway (serve_caption.py proxies /translate → NLLB,
    // so the browser never makes a cross-origin call → no CORS).
    const base=$("trUrl").value.trim().replace(/\/$/,"") || location.origin;
    try{
      const r=await fetch(base+"/translate",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text,src_lang:srcLang(),tgt_lang:tgt})});
      if(!r.ok) return "";
      const j=await r.json();
      return j.translation || j.translated || "";
    }catch(e){ return ""; }
  }

  function renderCurrent(orig, tgt, pending){
    emptyEl.style.display="none";
    curEl.classList.remove("idle");
    curSrc.textContent=orig;
    const transOnly=!tgtLang();
    curEl.classList.toggle("same", transOnly);
    curTgt.textContent= transOnly ? "" : (tgt||"");
    curTgt.classList.toggle("pending", !!pending);
    curMeta.textContent= transOnly ? "转录" : (srcLang()+" → "+tgtLang());
  }

  // partial: show original live; debounce-translate the evolving text.
  function onPartial(text){
    if(!text) return;
    curOriginal=text;
    renderCurrent(text, curTgt.textContent, true);
    scrollDown();
    if(!tgtLang()) return;
    clearTimeout(debounceTimer);
    debounceTimer=setTimeout(async ()=>{
      const snap=curOriginal;
      if(snap===lastTranslatedSrc) return;
      const t=await translate(snap);
      lastTranslatedSrc=snap;
      if(curOriginal===snap && recording) renderCurrent(snap, t, true);  // still current
    }, 350);
  }

  async function onFinal(text, lang){
    clearTimeout(debounceTimer);
    const orig=(text||curOriginal||"").trim();
    curOriginal=""; lastTranslatedSrc="";
    if(!orig){ resetCurrent(); return; }
    const tgt=await translate(orig);
    const transOnly=!tgtLang();
    const div=document.createElement("div");
    div.className="line"+(transOnly?" same":"");
    div.innerHTML=`<div class="src">${esc(orig)}</div>`+
      `<div class="tgt">${esc(tgt)}</div>`+
      `<div class="meta">${esc(transOnly?"转录":(srcLang()+" → "+tgtLang()))}</div>`;
    historyEl.appendChild(div);
    lineCount++; counts.textContent=lineCount+" 句";
    resetCurrent(); scrollDown();
  }
  function resetCurrent(){
    curSrc.textContent=""; curTgt.textContent=""; curMeta.textContent="";
    curEl.classList.add("idle"); curEl.classList.remove("same");
  }

  // ── audio ──────────────────────────────────────────────────────
  function f32ToI16(f32){ const o=new Int16Array(f32.length);
    for(let i=0;i<f32.length;i++){const s=Math.max(-1,Math.min(1,f32[i])); o[i]=s<0?s*0x8000:s*0x7fff;} return o; }
  function resample(f32, sr){ if(sr===TARGET_SR) return f32;
    const ratio=sr/TARGET_SR, n=Math.floor(f32.length/ratio), o=new Float32Array(n);
    for(let i=0;i<n;i++){const idx=i*ratio,i0=Math.floor(idx),i1=Math.min(i0+1,f32.length-1),fr=idx-i0;
      o[i]=f32[i0]*(1-fr)+f32[i1]*fr;} return o; }

  async function start(){
    if(recording) return;
    recBtn.disabled=true; setStatus("wait","请求麦克风…");
    try{
      micStream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,
        echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
    }catch(e){ setStatus("off","麦克风被拒绝"); recBtn.disabled=false; return; }
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    sourceNode=audioCtx.createMediaStreamSource(micStream);
    procNode=audioCtx.createScriptProcessor(2048,1,1);
    procNode.onaudioprocess=(e)=>{
      const f32=e.inputBuffer.getChannelData(0);
      let peak=0; for(let i=0;i<f32.length;i++){const a=Math.abs(f32[i]); if(a>peak)peak=a;}
      lvl.style.width=Math.min(100,peak*140).toFixed(0)+"%";
      if(!recording||!ws||ws.readyState!==WebSocket.OPEN) return;
      ws.send(f32ToI16(resample(f32,audioCtx.sampleRate)).buffer);
      // Client VAD: speech then >=VAD_SILENCE_MS quiet → finalize this utterance
      // with end_utterance (server stays open for the next one).
      const chunkMs=(f32.length/audioCtx.sampleRate)*1000;
      if(peak>VAD_TH){ vadSpeaking=true; vadSilenceMs=0; vadSpokeMs+=chunkMs; }
      else if(vadSpeaking){
        vadSilenceMs+=chunkMs;
        if(vadSilenceMs>=VAD_SILENCE_MS && vadSpokeMs>=VAD_MIN_SPEECH_MS){
          try{ ws.send(JSON.stringify({command:"end_utterance"})); }catch{}
          vadReset();
        }
      }
    };
    sourceNode.connect(procNode); procNode.connect(audioCtx.destination);
    vadReset();
    recording=true; recBtn.classList.add("on"); recLabel.textContent="停止录音"; recBtn.disabled=false;
    connectWs();
  }

  function connectWs(){
    if(!recording) return;
    closeWs();
    setStatus("wait","连接中…"); wsOpenTs=0;
    // Empty = same-origin gateway /asr (gateway forwards to SLV). Going through
    // localhost sidesteps the macOS system proxy, which corrupts WS upgrades to
    // Tailscale IPs (100.64/10 is not in the proxy bypass list).
    let url=$("slvUrl").value.trim();
    if(!url){ const p=location.protocol==="https:"?"wss":"ws";
      // vad=none → client drives endpointing via {command:end_utterance}, which
      // keeps the SLV socket OPEN across utterances (server VAD would finalize+
      // close after one). One connection for the whole conversation.
      url=p+"://"+location.host+"/asr?language=auto&sample_rate=16000&vad=none"; }
    gotData=false;
    try{ ws=new WebSocket(url); ws.binaryType="arraybuffer"; }
    catch(e){ setStatus("off","地址无效"); stop(); return; }
    ws.onopen=()=>{ setStatus("on","录音中"); wsOpenTs=performance.now(); };
    ws.onmessage=(ev)=>{ let m; try{m=JSON.parse(ev.data);}catch{return;}
      gotData=true; failCount=0;                         // this connection is healthy
      const t=m.type||"";
      if(t==="partial") onPartial(m.text||"");
      else if(t==="final") onFinal(m.text||"", m.language||"");
      else if(t==="reset") resetCurrent();
    };
    // /asr/stream is an open-mic, multi-utterance session, but the server may
    // close the socket between utterances (idle / per-turn timeout). While the
    // user is still recording we just reconnect and keep going — clicking 开始录音
    // once should cover a whole conversation. Only a run of connects that yield
    // NO data (real rejection / wrong address) hard-stops, to avoid a storm.
    ws.onclose=(ev)=>{ ws=null;
      if(!recording){ setStatus("off","已停止"); return; }
      if(!gotData) failCount++;
      if(failCount>=6){ setStatus("off","多次连接无响应，已停止（检查 SLV 地址）"); stop(); return; }
      setStatus("wait","重连中…"); reconnectTimer=setTimeout(connectWs, gotData?250:800); };
    ws.onerror=()=>{ try{ws&&ws.close();}catch{} };
  }
  function closeWs(){
    if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
    if(!ws) return;
    try{ if(ws.readyState===WebSocket.OPEN){ ws.send(new ArrayBuffer(0)); ws.close(1000,"stop"); }
         else if(ws.readyState===WebSocket.CONNECTING){ ws.close(); } }catch{}
    try{ ws.onopen=ws.onmessage=ws.onerror=ws.onclose=null; }catch{}
    ws=null;
  }
  function stop(){
    recording=false; recBtn.classList.remove("on"); recLabel.textContent="开始录音"; recBtn.disabled=false;
    closeWs();
    try{ if(procNode)procNode.disconnect(); }catch{}
    try{ if(sourceNode)sourceNode.disconnect(); }catch{}
    try{ if(audioCtx)audioCtx.close(); }catch{}
    if(micStream) micStream.getTracks().forEach(t=>t.stop());
    procNode=sourceNode=audioCtx=micStream=null; lvl.style.width="0%";
    setStatus("off","已停止"); resetCurrent();
  }
  recBtn.onclick=()=> recording ? stop() : start();
  setStatus(null,"未连接");

  // Guard: this page must be served by serve_caption.py (the gateway provides a
  // same-origin host for /asr + /translate). Opening the file directly (file://)
  // has no host → ws:///asr is malformed and CORS/proxy break everything.
  if(location.protocol==="file:"){
    recBtn.disabled=true;
    emptyEl.innerHTML="请勿直接双击打开此文件。<br>先在终端运行 "+
      "<code>uv run python ovs_agent/plugins/static/serve_caption.py</code>，"+
      "再用浏览器打开 <b>http://localhost:18790</b>。";
    setStatus("off","请经网关打开");
  }
</script>
</body>
</html>
