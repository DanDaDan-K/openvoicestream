# LiveCaptionApp — real-time bilingual captions from streaming ASR.
# partial → SegmentCommitter → translate → on_translation (dashboard). No TTS.
# Set translator_backend=noop for a pure transcription view.
slv_url: "${OVS_SLV_URL:-ws://localhost:8621/v2v/stream}"
slv_config:
  asr_language: "${OVS_ASR_LANG:-auto}"
  sample_rate: 16000
  vad: "silero"
  vad_silence_ms: 400
  multi_utterance: true

# No LLM, no TTS — this is a caption renderer.
llm_backend: "noop"

# Translation. noop = pure transcription (translated == original).
translator_backend: "${OVS_TRANSLATOR_BACKEND:-ctranslate2}"
translator_url: "${OVS_TRANSLATOR_URL:-http://localhost:9001}"
translator_src_lang: "${OVS_SRC_LANG:-zho_Hans}"
translator_tgt_lang: "${OVS_TGT_LANG:-eng_Latn}"
translator_timeout_s: 5.0

# Streaming commit / debounce
committer_agreement_n: 2
committer_min_commit_chars: 1
translate_debounce_ms: 250

# No assistant audio → never interrupt; partials always flow through.
barge_in_enabled: false

# Audio: mic in only, no speaker output.
audio_input_device: null
audio_output_device: null
audio_input_sample_rate: 16000

# Client-side VAD
client_vad_backend: "auto"
client_vad_speech_min_ms: 200
client_vad_silence_ms: 600
client_vad_drive_eos: false

pipeline_mode: "always_on"
asr_final_timeout_s: 3.0
log_level: "INFO"
