# SimulInterpretApp — simultaneous(-ish) speech interpretation.
# partial → SegmentCommitter (monotonic) → translate → TTS. No LLM.
slv_url: "${OVS_SLV_URL:-ws://localhost:8621/v2v/stream}"
slv_config:
  asr_language: "${OVS_ASR_LANG:-auto}"
  tts_language: "${OVS_TTS_LANG:-en}"
  tts_speaker_id: null
  tts_speed: 1.0
  sample_rate: 16000
  vad: "silero"
  vad_silence_ms: 400
  multi_utterance: true

llm_backend: "noop"

# Translation backend
translator_backend: "${OVS_TRANSLATOR_BACKEND:-ctranslate2}"
translator_url: "${OVS_TRANSLATOR_URL:-http://localhost:9001}"
translator_src_lang: "${OVS_SRC_LANG:-zho_Hans}"
translator_tgt_lang: "${OVS_TGT_LANG:-eng_Latn}"
translator_timeout_s: 5.0

# Streaming commit
committer_agreement_n: 2
committer_min_commit_chars: 1

# Interpretation mode:
#   off = clause-lag (speak at sentence end; robust, any hardware)
#   on  = full-duplex overlap (speak per-clause while user talks; needs AEC/headphones)
overlap_mode: "${OVS_OVERLAP_MODE:-off}"

# Self-echo backstop (matters in overlap mode on a single speaker+mic device)
echo_filter_enabled: true
echo_similarity_threshold: 0.82
echo_window_s: 4.0

# Translation must never self-interrupt; keeps partials flowing during TTS.
barge_in_enabled: false

# Audio
audio_input_device: null
audio_output_device: null
audio_input_sample_rate: 16000
audio_output_sample_rate: 24000

# Client-side VAD
client_vad_backend: "auto"
client_vad_speech_min_ms: 200
client_vad_silence_ms: 600
client_vad_drive_eos: false

pipeline_mode: "always_on"
asr_final_timeout_s: 3.0
log_level: "INFO"
