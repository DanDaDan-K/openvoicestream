# voice_arm agent config — actuator (SO-ARM) voice controller.
#
# Anything ${...} is substituted from environment at load time (see
# ovs_agent/config.py _expand_env). Anything not listed here
# falls back to the Config dataclass defaults.
#
# The actuator is pluggable: metadata.actuator.backend selects the
# concrete driver (currently "so_arm"). The legacy metadata.arm shape is
# still accepted as a read-compat alias for one release.

slv_url: "ws://${VOICE_SERVICE_HOST:-localhost}:${VOICE_SERVICE_PORT:-8621}/v2v/stream"

slv_config:
  asr_language: "${STT_LANGUAGE:-auto}"
  tts_language: "zh"
  tts_speaker_id: ${TTS_SID:-52}
  tts_speed: ${TTS_SPEED:-1.0}
  sample_rate: 16000
  vad: "silero"
  # Server VAD silence-to-end threshold. 600ms: long enough not to cut the
  # tail between a wake word and its command, short enough that back-to-back
  # commands each endpoint promptly.
  vad_silence_ms: 600
  multi_utterance: true

# Wake-word pipeline; OpenWakeWordSource fires app.wake() from local audio.
# We DISABLE the framework's stock wake_sources list because VoiceArmApp
# registers its own OpenWakeWordSource directly.
pipeline_mode: "wake_word"
default_mode: "chat"
wake_sources: []
sleep_timeout_s: 30.0

# VAD: server-only. The agent forwards raw mic audio and lets the SLV
# server segment + finalise (Qwen3-ASR streaming returns empty text when
# the client trims the speech segment under it).
client_vad_backend: "off"
client_vad_threshold: 0.012
client_vad_speech_min_ms: 200
client_vad_silence_ms: 600
client_vad_drive_eos: false

# ── continuous-dialogue mic-pump (calibrated for reSpeaker Flex XVF3800
# ch1 on seeed-orin-nx). Framework defaults are all OFF/no-op; these
# enable + tune them for this hardware.
energy_gate_enabled: true
energy_gate_open_rms: 0.002
energy_gate_close_rms: 0.001
energy_gate_hangover_ms: 300
mic_makeup_gain: 12.0
# silero-primary endpointing: let the SERVER silero VAD decide the end of a
# command (it handles word-internal dips far better than the energy-gate edge,
# which cut 4-char commands like "张开夹爪" short → empty finals). The energy
# gate still zero-fills silence so silero has clean gaps to endpoint on.
gate_drive_eos: false
gate_eos_min_speech_ms: 250
# Stall fallback: if silero goes quiet without finalizing (wedge on a noisy
# mic), force one asr_eos after this long with no asr_partial — reset by each
# partial, so a long sentence is never cut, it only catches a true stall.
vad_stall_eos_ms: 1500
mic_drop_while_speaking: true
# Force a fresh ASR worker on every wake (single Qwen3-ASR worker degrades
# after ~4 utterances on one persistent session).
reconnect_on_wake: true

# LLM — points at the edge-llm container by service name.
llm_backend: "edge_llm"
llm_base_url: "http://${LLM_SERVICE_HOST:-localhost}:${LLM_SERVICE_PORT:-8000}/v1"
llm_api_key: "EMPTY"
llm_model: "${LLM_MODEL:-Qwen/Qwen3-4B-AWQ}"
llm_first_token_timeout_s: 15.0
llm_stream_idle_timeout_s: 30.0

# Tool calling — required for actuator-action dispatch.
tools_enabled: true
# Empty allowlist means "expose every tool registered by plugins" —
# ArmPlugin registers exactly the actions present in actions.yaml.
tools_default_allowlist: []
tools_max_iterations: 3

# System prompt baked into the chat mode. Keep ``/no_think`` verbatim —
# Qwen3 uses it as a soft toggle.
system_prompt: |
  You are a voice controller for a 6-DoF robotic arm called SO-ARM.
  The user speaks commands aloud and you reply via TTS.

  Behaviour:
  - When the user clearly requests a motion, FIRST emit a brief
    spoken acknowledgement, THEN call the matching tool function.
    The acknowledgement is ONE OR TWO words in the user's language
    ("好的，" / "OK," / "Sure,") and gets spoken immediately while
    the robot executes the motion — without it the user thinks the
    system didn't hear them during the 2-5 second motion. Examples:
      User: "挥手"     → Emit "好的" → call wave()
      User: "wave"     → Emit "OK"   → call wave()
      User: "回到原位" → Emit "好的" → call home()
    AFTER the tool returns, emit a short confirmation ("已挥手" /
    "Done" / "已回到原位"), 1 short sentence max.
  - To pick the right tool, read each tool's description and match the
    user's exact phrase against the trigger words listed there. Chinese
    triggers are LITERAL: '摇头' MUST call shake_head, NOT wave;
    '挥手' MUST call wave, NOT shake_head; '点头' MUST call nod, NOT
    look_down. Never substitute a semantically-similar tool — if no
    description literally contains the user's phrase, reply that you
    don't have that action.
  - HARD RULE — only call a tool when the user's text contains the
    EXACT trigger phrase listed in that tool's description. If the
    phrase is not literally present, DO NOT call any tool — reply
    "没听清，请再说一次。" / "Sorry, I didn't catch that." instead.
    The user's transcription is from ASR which often garbles audio
    into the wrong characters; you MUST refuse those rather than
    guess.

  /no_think

# Per-mode temperature: 0 forces deterministic tool selection.
mode_overrides:
  chat:
    temperature: 0.0

# Audio devices — entrypoint resolves the reSpeaker index.
audio_input_device: ${MIC_INDEX:-}
audio_output_device: ${SPEAKER_DEVICE:-}
audio_input_sample_rate: 16000
audio_output_sample_rate: 16000

log_level: "INFO"

# Our extension blocks live under metadata so the Config dataclass accepts
# the YAML without schema changes (it drops unknown TOP-LEVEL keys).
metadata:
  wakeword:
    model: "${WAKEWORD_MODEL:-hey jarvis}"
    threshold: ${WAKEWORD_THRESHOLD:-0.5}
    cooldown_s: ${WAKEWORD_COOLDOWN:-2.0}
    vad_threshold: ${WAKEWORD_VAD_THRESHOLD:-0.0}
    # reSpeaker XVF3800 is a 6-channel USB exclusive device that refuses
    # channels=1 (PaErrorCode -9998). VoiceArmApp opens it with this
    # native count and picks ONE channel as the mono signal.
    mic_channels: ${MIC_CHANNELS:-1}
    # XVF3800 6-channel layout: ch1 = processed ASR audio (recommended).
    mic_channel_select: ${MIC_CHANNEL_SELECT:-}

  # ── Pluggable actuator (NEW shape) ───────────────────────────────
  # backend selects the driver; config is passed to its constructor.
  # actions.yaml path is configurable (NOT hard-coded).
  actuator:
    backend: so_arm
    config:
      port: "${ARM_PORT:-auto}"
      arm_id: "${ARM_ID:-voice_arm}"
      move_delay: ${ARM_MOVE_DELAY:-1.5}
      gesture_delay: ${ARM_GESTURE_DELAY:-0.4}
    actions_yaml_path: "${CONFIG_DIR:-/opt/seeed/voice_arm/config}/actions.yaml"
    observation_port: ${OBSERVATION_PORT:-8765}
    # When true, recording a new action via the UI also wipes the
    # multi-turn conversation history.
    clear_history_on_tool_change: ${ARM_CLEAR_HISTORY_ON_TOOL_CHANGE:-false}
    # Single-turn mode (default true): clear conversation history after
    # every turn (voice-arm is a command interface, not a chatbot).
    clear_history_on_turn_end: ${ARM_CLEAR_HISTORY_ON_TURN_END:-true}

  # ── Legacy read-compat alias (deprecated) ────────────────────────
  # The old metadata.arm shape is still accepted by VoiceArmApp for one
  # release. Prefer metadata.actuator above. Uncomment to use:
  # arm:
  #   arm_port: "${ARM_PORT:-auto}"
  #   arm_id: "${ARM_ID:-voice_arm}"
  #   move_delay: ${ARM_MOVE_DELAY:-1.5}
  #   gesture_delay: ${ARM_GESTURE_DELAY:-0.4}
  #   actions_yaml_path: "${CONFIG_DIR:-/opt/seeed/voice_arm/config}/actions.yaml"
  #   observation_port: ${OBSERVATION_PORT:-8765}
