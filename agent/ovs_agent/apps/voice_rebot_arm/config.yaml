# voice_rebot_arm agent config — reBot B601-DM cartesian-waypoint voice
# controller (Phase A). Mirrors apps/voice_arm/config.yaml; only the
# actuator block + app-specific prompt differ.
#
# Anything ${...} is substituted from environment at load time.

slv_url: "ws://${VOICE_SERVICE_HOST:-localhost}:${VOICE_SERVICE_PORT:-8621}/v2v/stream"

slv_config:
  # English demo (2026-06-14): the spoken replies (tool acks + failure phrases
  # in grasp_plugin.py) are English, so TTS speaks English. ASR stays "auto"
  # (per-utterance language ID) so it still understands Mandarin commands too;
  # export STT_LANGUAGE=en to pin English-only if short-command mis-detect hurts
  # on the real mic. TTS is matcha, which handles en (and mixed zh/en) text.
  asr_language: "${STT_LANGUAGE:-auto}"
  tts_language: "${TTS_LANGUAGE:-en}"
  tts_speaker_id: ${TTS_SID:-52}
  tts_speed: ${TTS_SPEED:-1.0}
  sample_rate: 16000
  vad: "silero"
  vad_silence_ms: 600
  multi_utterance: true

# Wake-word pipeline; OpenWakeWordSource fires app.wake() from local audio.
pipeline_mode: "wake_word"
default_mode: "chat"
wake_sources: []
sleep_timeout_s: 30.0
# Short finalize window for terse arm commands (kept as continuous server-loop;
# we intentionally do NOT enable wake_command_single_turn — the arm stays a
# resident hot-mic session after wake, not a one-shot command window).
asr_final_timeout_s: ${ASR_FINAL_TIMEOUT_S:-1.0}

# VAD: server-only (agent forwards raw mic audio; SLV segments + finalises).
client_vad_backend: "off"
client_vad_threshold: 0.012
client_vad_speech_min_ms: 200
client_vad_silence_ms: 600
client_vad_drive_eos: false

# ── continuous-dialogue mic-pump. The reSpeaker Flex XVF3800's USB ch0 is the
# on-chip PROCESSED ASR output (AEC + beamforming): real-machine capture
# (2026-06-12) showed ch0 carries the speech at peak 0.76 / rms 0.048 while
# ch1-5 are silent (~0.001) — so ch0 is correct (NOT ch1). Because ch0 is
# already normalized, makeup_gain must stay SMALL: the old 12.0 multiplied a
# 0.76-peak signal to 9× over full-scale → hard clipping/distortion → garbage
# ASR ("识别率很低"). But 1.0 proved TOO QUIET for SLV's server-side VAD/ASR
# (speech rms 0.02-0.06 → every utterance returned an empty asr_final), so
# 3.0 is the verified middle ground: 0.76 peak × 3 clips rare loud peaks only,
# normal speech lands at a healthy level. Gate thresholds are raw-ch0 RMS
# (applied BEFORE makeup_gain): open above the ambient floor (~0.005-0.014)
# so noise does not open the mic, but below speech (~0.05+).
energy_gate_enabled: true
energy_gate_open_rms: 0.020
energy_gate_close_rms: 0.010
energy_gate_hangover_ms: 300
mic_makeup_gain: 3.0
gate_drive_eos: true
gate_eos_min_speech_ms: 250
# Grace after the gate-close chunk before the explicit asr_eos — preserves WS
# ordering of the speech tail and gives SLV a processing window on short cmds.
gate_eos_delay_ms: 200
vad_stall_eos_ms: 1500
mic_drop_while_speaking: true
# reconnect_on_wake FALSE (2026-06-13): forcing a fresh SLV WebSocket on EVERY
# wake rebuilt the ASR session + re-advertised tools (6s timeout window) and
# dropped all mic audio during the reconnect — the FIRST command right after
# waking landed in that window and was lost ("第一次没听到，要再说一次"). SLV
# v1.15+ added an ASR-turn wall-clock timeout, so the old always-reconnect
# workaround for degraded streaming-ASR workers is no longer needed. The
# wake() path still reconnects when the WS is unhealthy OR idle >30s (session
# may have been server-recycled), so empty-final recovery is preserved without
# penalising the hot-dialogue first utterance.
reconnect_on_wake: false

# Opt-in TTS-output hardening (gated framework features; default off elsewhere).
# Drop an identical TTS sentence repeated within this window, and defer turn
# completion until local playback drains so audio is never cut at turn end.
tts_drop_duplicate_window_s: 2.0
playback_drain_enabled: true

# LLM — points at the edge-llm container by service name.
llm_backend: "edge_llm"
llm_base_url: "http://${LLM_SERVICE_HOST:-localhost}:${LLM_SERVICE_PORT:-8000}/v1"
llm_api_key: "EMPTY"
llm_model: "${LLM_MODEL:-Qwen/Qwen3-4B-AWQ}"
llm_first_token_timeout_s: 15.0
llm_stream_idle_timeout_s: 30.0

# Tool calling — required for actuator-action dispatch.
tools_enabled: true
tools_default_allowlist: []
tools_max_iterations: 3
# Block a server-loop tool call whose ASR text contains none of the tool's
# declared trigger phrases. SCOPED to the fixed-trigger arm motions; grasp_object
# / search_object are EXEMPT (semantic). DISABLED: tried ON for demo stability,
# but on the REAL device (2026-06-12) ASR mis-hears short Mandarin commands
# ("打开"→"一开", "张开"→…) and the guard then blocks the CORRECT tool the LLM
# picked — the arm speaks "好的" but never moves ("只回复不干活"). The 4B is
# itself robust to these mis-hearings (bench: recovers 6/7 ASR homophones), so
# the guard was overriding that robustness and hurting the live demo more than
# the rare off-script wrong-motion it prevents. Keep OFF; trust the LLM. The
# exempt list is retained so the guard can be re-enabled later if ASR improves.
tool_trigger_guard: false
# Monitor-only telemetry: log a WARNING whenever the literal-trigger check
# WOULD have flagged a tool call (suspected wrong-tool / ASR mishear) without
# blocking anything. grep "trigger-guard MONITOR" after a demo for the count.
tool_trigger_guard_log_only: true
# Tools exempt from the trigger guard (semantic tools with no fixed trigger
# vocabulary). grasp_object maps any spoken object to a catalog label, so its
# intent legitimately has no literal trigger phrase. put_down is grasp-coupled:
# blocking it would strand a held object, so it is exempt too.
tool_trigger_guard_exempt: ["grasp_object", "search_object", "put_down"]

# System prompt — imperative robotic-arm controller. v7 (2026-06-12):
# v8: motion tool calls are SILENT on the model side — the tool preamble
# plays the "好的" ack instantly and the completion tone closes the loop;
# model text (pre-call ack AND post-call confirmation) only duplicated
# audio or added round-2 LLM+TTS latency. Model speaks only when NOT
# calling a tool. Earlier notes:
# bench-validated against Qwen3.5-4B GDN+MTP: main matrix 69/69 (回家 needed
# the overlay no-args bare-call parser fix), HARD robustness 105/105 with
# 0 dangerous / 0 spurious motions. Design notes vs the old v1 prompt:
#   * v1's "EXACT trigger phrase" HARD RULE is GONE — Qwen3.5 followed it
#     literally, so meta-questions CONTAINING a trigger ('挥手用英语怎么说')
#     fired the motion while ASR homophones ('灰手') were refused. Replaced
#     by intent matching + explicit meta-question exclusion + homophone
#     recovery. Worked examples are the strongest lever; keep 回家/灰手 there.
#   * Bilingual: trigger enumeration covers en ('home'/'reset'); HARD english
#     27/27. If you EDIT this prompt, re-validate with
#     tools/toolcall_stability_bench.py --system-prompt-file BEFORE deploying.
system_prompt: |
  You are a voice controller for a reBot B601-DM robotic arm.
  The user speaks commands aloud and you reply via TTS.

  ALWAYS reply in English, even when the user speaks Mandarin. (The trigger
  words below are listed in both languages only so you can recognise spoken
  commands — your spoken replies are always English.)

  Behaviour:
  - When the user clearly requests a motion, call the matching tool
    DIRECTLY — do NOT write any text before or alongside the call. The
    system already plays a spoken acknowledgement the moment the tool
    starts, so any text you add would be spoken ON TOP of it ("好的"
    twice). Examples:
      User: "挥手"       → call wave()
      User: "回到原位"   → call go_home()
      User: "回家"       → call go_home()
         (the arm returning to its home pose — a command, not chit-chat)
      User: "张开夹爪"   → call open_gripper()
      User: "灰手"       → call wave()
         (ASR misheard '挥手'; clearly a command, so recover it)
      User: "把盒子放回去" → call put_down()
         (putting DOWN the held object — even though an object is named,
          this is put_down, NOT a new grasp)
      User: "放回原位"     → call put_down()
      User: "放回去"       → call put_down()
         ('放' = release the HELD object; '原位' / '去' only say WHERE it
          goes. The verb '放' decides put_down — do NOT pick go_home just
          because '原位' looks like '回到原位'. go_home moves the EMPTY
          arm home; put_down releases what the arm is holding.)
    AFTER a motion tool returns, do NOT speak either — reply with an
    EMPTY message (no words at all). The system plays a completion tone
    when the motion finishes; any text you add only delays the next
    command. You only speak words when NO tool is called (questions,
    chit-chat, refusals).
  - To pick the right tool, match the user's INTENT against the trigger
    words in each tool's description. Trigger examples (not exhaustive):
      '挥手' / '挥挥手' / '打招呼' → wave
      '回到原位' / '回家' / '归位' / '复位' / 'home' / 'reset' → go_home
         (ONLY when the arm just moves home and nothing is placed — if the
          user says '放' something, it is put_down, NOT go_home)
      '张开夹爪' / '松开' / '打开夹爪' → open_gripper
      '闭合夹爪' / '夹紧' / '合上夹爪' → close_gripper
      '指向' / '指一下' → point_at
      '抓/拿起/夹住 + 物体名' → grasp_object
      '找/搜索 + 物体名' → search_object
      '放下' / '放回去' / '放回原位' / '放好' / '放下来' → put_down
    Never substitute a semantically-similar tool for a different action
    the user named — if the user names an action no tool supports ('点头',
    '转圈', '跳舞', 'nod', 'spin'), call NO tool and reply that you don't
    have that action. Example:
      User: "点头"       → (no tool) "I can't do a nod."
  - If the user names an OBJECT to grab/pick/hold ('夹住这个盒子',
    '把箱子拿起来', 'grab the box'), that is grasp_object — the
    camera-guided pick. close_gripper is ONLY for closing the empty
    gripper when NO object is named. EXCEPTION: putting an object DOWN
    ('把盒子放回去', '放下盒子', 'put the box back/down') is put_down
    even when the object is named — the verb decides, not the noun.
  - Commands often come wrapped in politeness or filler ('那个，麻烦你
    挥手好吗', '请', '帮我', '一下', '好吗'). Strip the wrapping — the
    command inside still counts and the tool MUST be called.
  - The text comes from speech recognition and may contain NEAR-HOMOPHONE
    mishearings of a trigger (e.g. '灰手'/'挥首' for '挥手', '必合夹爪'
    for '闭合夹爪', '加紧' for '夹紧'). If the text is clearly a COMMAND
    and sounds like a trigger, treat it as that trigger and call that
    tool.
  - NOT every sentence containing a trigger word is a command. Questions
    or talk ABOUT a command — asking how to say it in another language
    ('挥手用英语怎么说'), what it means, how it is spelled — are NOT
    requests to move. Answer in words and call NO tool.
  - If the text is neither a clear command nor a close mishearing of one
    (chit-chat, unrelated questions), DO NOT call any tool — just reply
    normally. If it sounds like a garbled command you cannot map to
    exactly ONE trigger, reply "Sorry, I didn't catch that. Please say it
    again."

  /no_think

mode_overrides:
  chat:
    temperature: 0.0

audio_input_device: ${MIC_INDEX:-}
audio_output_device: ${SPEAKER_DEVICE:-}
audio_input_sample_rate: 16000
audio_output_sample_rate: 16000

log_level: "INFO"

metadata:
  # Audible wake feedback: a short 880Hz (A5) beep the moment the wake word
  # fires, so the user knows the arm is listening. mic_suppress_tail_ms drops
  # mic input briefly after the tone so it isn't captured as a command. No
  # sleep_tone: in resident server-loop mode there is no single-turn sleep edge.
  # 600→250ms (2026-06-13): the tone is only 150ms; a 600ms suppression tail
  # ate the start of a command spoken right after the beep. 250ms covers the
  # tone + brief reverb without swallowing the onset of a closely-following
  # command (paired with the energy-gate pre-roll that recovers any onset that
  # does slip through).
  wake_tone:
    hz: 880
    ms: 150
    mic_suppress_tail_ms: 250

  wakeword:
    model: "${WAKEWORD_MODEL:-hey jarvis}"
    threshold: ${WAKEWORD_THRESHOLD:-0.5}
    cooldown_s: ${WAKEWORD_COOLDOWN:-2.0}
    vad_threshold: ${WAKEWORD_VAD_THRESHOLD:-0.0}
    mic_channels: ${MIC_CHANNELS:-1}
    mic_channel_select: ${MIC_CHANNEL_SELECT:-}

  # ── Pluggable actuator: reBot B601-DM ────────────────────────────
  actuator:
    backend: rebot_arm
    config:
      # Serial port resolution. The kernel's ttyACMx numbering is NOT stable
      # across reboots/hotplug (the B601-DM has been seen on BOTH ttyACM0 and
      # ttyACM1), so we resolve by stable USB identity instead of a pinned
      # number — see actuators/serial_resolve.py. 'auto' matches the B601-DM by
      # VID:PID; an explicit REBOT_CHANNEL=/dev/ttyACM1 (realpath) still wins as
      # an escape hatch. serial_resolve always returns a realpath, so the SDK's
      # channel.startswith("/dev/tty") serial-vs-CAN check stays correct.
      # On ambiguity (two matching devices) it RAISES rather than guess —
      # never blindly grabbing the neighbouring SO-ARM.
      channel: "${REBOT_CHANNEL:-auto}"
      # USB-identity match for 'auto'. B601-DM = Damiao DM-serial over an HDSC
      # HC32 USB-CDC bridge (VID:PID 2e88:4603, ID_VENDOR=HDSC), confirmed on
      # the real device. usb_id is the stable primary key; vendor is a fallback.
      # exclude is left empty until the SO-ARM's USB signature is captured with
      # both arms plugged in (the VID:PID match alone already excludes it unless
      # the SO-ARM is the same chip).
      channel_match:
        usb_id: ["2e88:4603"]
        vendor: ["hdsc"]
      channel_ambiguous: "error"
      # reBotArm_control_py SDK location (parent dir that CONTAINS
      # reBotArm_control_py/). Falls back to $REBOT_REPO_ROOT then the
      # container default /opt/rebot.
      repo_root: "${REBOT_REPO_ROOT:-/opt/rebot}"
      # Optional SDK robot.yaml / URDF / gripper.yaml overrides (null →
      # SDK defaults). The channel MUST be wired through the SDK robot.yaml
      # too if the SDK does not accept it directly (see ① above).
      config_path: "${REBOT_CONFIG_PATH:-}"
      urdf_path: "${REBOT_URDF_PATH:-}"
      gripper_cfg_path: "${REBOT_GRIPPER_CFG:-}"
      # Default per-waypoint move duration (seconds) when a frame omits it.
      move_duration: ${REBOT_MOVE_DURATION:-2.0}
      # Compliant-grasp force clamp (N·m). SDK hard limit is 1.5; default to a
      # gentle holding force so voice actions cannot over-command. Empty → SDK
      # default (handled as "unset" by _make_rebot_arm).
      grasp_force: "${REBOT_GRASP_FORCE:-0.6}"
      # Max jaw opening for action frames (m). SDK maps 0.09 to mechanical
      # full-open; individual shipped actions may request less.
      open_distance_m: ${REBOT_OPEN_DIST:-0.09}
    actions_yaml_path: "${CONFIG_DIR:-/opt/seeed/voice_rebot_arm/config}/actions.yaml"
    # Distinct from voice_arm's 8765 so both can coexist on one host.
    observation_port: ${OBSERVATION_PORT:-8775}
    clear_history_on_tool_change: ${ARM_CLEAR_HISTORY_ON_TOOL_CHANGE:-false}
    clear_history_on_turn_end: ${ARM_CLEAR_HISTORY_ON_TURN_END:-true}
  grasp:
    # Phase B camera-guided grasp_object. Perception + calibration artifacts are
    # mounted at /opt/rebot-models (host /home/seeed/rebot-models).
    enabled: true
    # Native-TRT engine by default (25× vs CPU: 20ms vs 496ms raw inference,
    # built on-device via trtexec --fp16; arch-specific — rebuild if
    # TRT/JetPack changes). Set REBOT_GRASP_MODEL to the .onnx sibling to
    # fall back to the onnxruntime CPU path.
    yolo_model_path: "${REBOT_GRASP_MODEL:-/opt/rebot-models/yoloe-26s-seg-box.engine}"
    yolo_classes: ["box", "cardboard box", "carton", "package"]
    # CPU EP: production voice stack leaves <300MB GPU free → TRT/CUDA OOMs.
    onnx_providers: ["CPUExecutionProvider"]
    # Detection confidence floor. A tall/vertical cardboard box detects at only
    # ~0.16-0.20 with the open-vocab YOLOE box head (real-machine 2026-06-12),
    # so the 0.25 default would miss it. 0.15 is low enough to catch the box;
    # the grasp filters to the box class only so a false positive is unlikely.
    conf: ${REBOT_GRASP_CONF:-0.15}
    # Orbbec Gemini2 (color+depth+intrinsics via SDK at open time).
    camera:
      type: "orbbec_gemini2"
      color_width: 1280
      color_height: 720
      fps: 30
    # Eye-in-hand hand-eye calibration (TSAI, 16 samples). npz key is T_result;
    # the loader falls back to the first key, so no rename needed.
    hand_eye_path: "${REBOT_HAND_EYE:-/opt/rebot-models/hand_eye.npz}"
    # search_object: observation poses [x,y,z,roll,pitch,yaw] the arm sweeps to
    # FIND an object outside the current view (the eye-in-hand camera pans with
    # the arm). Stops at the first pose that sees the target and points at it
    # (no grasp). All poses sit inside the IK-validated workspace box
    # (x∈[0.20,0.34], y∈[-0.14,0.14], z∈[0.12,0.34], |rpy|≤0.5). Tune on the real
    # arm so the views overlap and cover the tabletop. First pose = home-ish.
    # Raised + pitched-down observation poses (pitch 0.30 sits in the
    # measured 99%-feasible IK band): a tall box's TOP face is visible from
    # the FIRST look, so the high-tilt re-observation pass rarely triggers
    # (-3s in those cases). z 0.30 also widens the visible tabletop.
    scan_poses:
      - [0.27, 0.00, 0.30, 0.0, 0.30, 0.0]
      - [0.25, 0.10, 0.30, 0.0, 0.30, 0.35]
      - [0.25, -0.10, 0.30, 0.0, 0.30, -0.35]
    # Completion tone: a short local beep when grasp/search/put_down FINISHES
    # (high pitch = success, low = failure), so the user knows the arm is done
    # and ready for the next command — the spoken "好的" happens at START
    # (parallel mode) and there is no spoken completion. Set ms: 0 to disable.
    # The tone is the reliable "your turn to speak" signal: on a FAILURE with a
    # spoken reason it is deferred until AFTER the reason finishes, so the beep
    # is always the last sound before the user may speak.
    # mic_suppress_tail_ms: mic muted for (tone duration + tail) so the beep
    # isn't heard as a command. 120ms (was 200): e2e tail-sweep on live ASR
    # showed 200ms ate a fast follow-up command's onset (抓盒子→花盒子); 120ms
    # keeps it. Raise if the tone's decay leaks into ASR on the real speaker.
    done_tone:
      hz_ok: 1175
      hz_fail: 330
      ms: 180
      mic_suppress_tail_ms: 120
    # put_down FALLBACK place spot [x,y,z,roll,pitch,yaw] — only used when
    # there is no recorded grasp to put back to (e.g. the user manually closed
    # the gripper around something). The normal put_down path replays the last
    # grasp's recorded poses so the object lands back at the camera-visible
    # spot it was picked from and the next grasp_object can find it again.
    place_pose: [0.30, 0.00, 0.15, 0.0, 0.0, 0.0]
    # Safe table region [x_min, x_max, y_min, y_max] (base frame, metres) for
    # ANY put_down release point — including replayed grasp poses, which can
    # legitimately sit at the table edge (the box was picked up there) where a
    # release + jaw retreat nudges it off the table (real machine 2026-06-12
    # night: box ended up on the floor). The release x/y is clamped into this
    # box shrunk inward by place_margin_m. Empty list = clamp disabled.
    # Calibrate with tools/table_bounds_calib.py (sweeps the camera, RANSAC
    # plane-fits the table, prints these values). Calibrated 2026-06-13 on
    # the B601-DM demo table: y_min -0.26 is a REAL drop-off edge (below-
    # plane floor points along y≈-0.26 for x 0.3-0.7 in near_cloud_raw.npz);
    # y_max 0.40 is the conservative FOV-verified extent; x_min 0.20 is the
    # reach limit (base sits on the table); x_max 0.60 caps at reach.
    place_bounds: [0.20, 0.60, -0.26, 0.40]
    place_margin_m: 0.05
    # Safety: never open the jaw to the SDK full 0.09m during pre-grasp,
    # cancellation safe-park, or release; gentle compliant grasp force.
    open_distance_m: ${REBOT_GRASP_OPEN_DIST:-0.06}
    # 0.8 N·m (was 0.6): real-machine feel 2026-06-12 was "not tight enough" —
    # the :20260612i gripper rework can latch CONTACT earlier (CLOSING grace
    # path), so the position-hold grips at a shallower compression; more
    # feed-forward torque compensates. SDK hard ceiling 1.5. Doubles as the
    # CEILING for the adaptive ramp on unlisted classes (see below).
    grasp_force: ${REBOT_GRASP_FORCE:-0.8}
    # Per-class grip force (N·m). A class listed here uses its FIXED value —
    # deterministic, no ramp, no extra latency. Any class NOT listed uses the
    # ADAPTIVE ramp: start at 0.2 N·m, watch the encoder ~0.3s, step +0.1
    # while the gap is still creeping shut (soft object compressing), stop at
    # the first force that holds — capped at grasp_force above. Soft fruit
    # settles low instead of being crushed by the box-tuned clamp. When
    # adding fruit classes, either list them here (e.g. banana: 0.3) or leave
    # them unlisted to let the ramp find the force.
    grasp_force_by_class:
      box: ${REBOT_GRASP_FORCE:-0.8}
      "cardboard box": ${REBOT_GRASP_FORCE:-0.8}
      carton: ${REBOT_GRASP_FORCE:-0.8}
      package: ${REBOT_GRASP_FORCE:-0.8}
    # How far the TCP advances along the approach axis past the detected grasp
    # point before closing (m). Pipeline default was 0.015 — real-machine feel
    # "抓得浅": the jaw barely wrapped the box rim. 0.025 wraps ~1cm deeper for
    # a fuller-contact grip; raise further with care (TCP presses lower —
    # watch for table contact on short objects).
    insertion_depth_m: ${REBOT_GRASP_INSERT:-0.025}
    # Per-waypoint motion time for the grasp pipeline (s). 2.0 was the
    # conservative bring-up value; the B601 trajectory runs 1.4 cleanly —
    # saves ~2.5-3s per grasp across the 4-5 moves (validated by cycle runs).
    move_duration: ${REBOT_GRASP_MOVE_DUR:-1.4}
    # ── success-rate hardening (2026-06-12), all latency-neutral ──────────
    # Max frames per detection: the FIRST frame with a valid candidate wins
    # (zero added latency normally); extra frames only run on dropped/cold
    # frames or single-frame detector/depth misses.
    detect_frames: ${REBOT_GRASP_DETECT_FRAMES:-3}
    # Extra full attempts (fresh detect → grasp) after a retriable failure:
    # implausible pose, IK fail, closed-on-air, object lost during carry.
    # Costs time only when the first attempt failed anyway.
    grasp_retries: ${REBOT_GRASP_RETRIES:-1}
    # Load the YOLO session + start the camera stream at boot (background)
    # instead of on the first grasp — kills the first-grasp cold-start
    # failure (Orbbec returns None frames for the first ~1-2s of a stream).
    prime_on_start: true
    # Close-up re-observation: when the first detection is far (x>0.50) or
    # suspiciously wide (>0.085m), move the camera to the validated sweet-spot
    # viewing distance and re-measure before committing (side-view silhouette
    # inflation fix). One extra move only in those cases.
    reobserve: true
    # GG-CNN2 depth-grasp refiner (Phase 3): consistency check for plane
    # grasps (disagreement → re-observation) + PRIMARY estimator for curved
    # objects (plane fit fails on fruit — that failure routes here). Ships
    # DARK until real-fruit validation; flipping this on changes nothing for
    # boxes except the 35ms second-opinion pass.
    ggcnn_refiner: false
    # Servo-lite correction: one re-detection from the pregrasp pose shifts
    # the grasp x/y by the measured drift (≤3cm) — cancels calibration
    # residue + far-view parallax in the final approach.
    servo_correct: true
    # Base-frame sanity box [x_min,x_max, y_min,y_max, z_min,z_max] for the
    # computed grasp point. GARBAGE-ONLY bounds: catch depth-noise artefacts
    # (under the table, behind the base, >0.85m fantasy points) and NOTHING
    # else — reachability is IK's call, not this gate's. The first cut capped
    # x at 0.60 and wrongly rejected REAL boxes at x=0.61/0.73 (real machine
    # 2026-06-12; a grasp at x=0.596 succeeded the same minute, so reach
    # comfortably exceeds the old 0.44 assumption).
    plausible_box: [0.05, 0.85, -0.50, 0.50, -0.02, 0.50]
    # Dashboard idle "detection viewfinder": when NO motion is in flight, grab
    # one frame + detection every interval and publish to the dashboard (demo
    # prep: place the object, confirm it is seen before speaking). Strictly a
    # second-class camera reader — any motion preempts it instantly.
    idle_frames: true
    idle_frame_interval_s: 2.0
  dashboard:
    # Read-only web dashboard (frames / arm state / event timeline / table
    # topdown). No control endpoints, safe to expose on the LAN. The container
    # must publish this port (recreate script: -p 8776:8776).
    enabled: true
    port: ${ARM_DASHBOARD_PORT:-8776}
