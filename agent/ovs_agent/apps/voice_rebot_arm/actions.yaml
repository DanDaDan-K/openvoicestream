# reBot B601-DM actions — cartesian-waypoint sequences (Phase A).
#
# Each frame's "joints" map is a CARTESIAN WAYPOINT (NOT joint angles):
#   x, y, z          TCP position in metres (IK target; move_to runs IK)
#   roll, pitch, yaw TCP orientation in radians
#   gripper          signed-magnitude gripper command (per-action amplitude):
#                      > 0  open to that WIDTH in metres (e.g. 0.06 = 6cm)
#                      < 0  grasp with that FORCE in N·m (e.g. -0.2 = 0.2 N·m)
#                      == 0 hold (arm-motion frames leave the gripper alone)
#   delay            settle pause after the waypoint (seconds, 0.05..5.0)
#
# Coordinates below were VALIDATED ON POWERED HARDWARE (2026-06-03, B601-DM on
# seeed-orin-nx): every waypoint passed check_ik (err ~5e-5..9e-5) and the arm
# reached each target within <1mm on FK readback. Home/ready pose is
# (0.27, 0, 0.24) with identity orientation. Safe workspace box used for
# tuning: x∈[0.20,0.34], y∈[-0.14,0.14], z∈[0.12,0.34], |rpy|≤0.5.
#
# Gripper-only actions (open/close) intentionally OMIT pose fields so the arm
# does NOT move when you only ask for the gripper (the actuator skips move_to
# when no x/y/z/roll/pitch/yaw is present). Note: the HTTP verify-panel
# save/preview path validates all 7 fields, so re-saving these two via the
# panel would require adding a pose — fine for the shipped defaults.

sequences:

  # Return to the safe ready/home pose (IK-validated; FK lands within 0.6mm).
  go_home:
    description: >-
      Return the arm to its home / ready position. Triggers: "go home",
      "home", "reset position".
    frames:
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 2.0

  # Open the gripper FULLY (no arm motion — pose fields omitted on purpose).
  # 0.09 = mechanical full-open. This MUST stay full-open: the action doubles
  # as "release / 松开" while holding an object, and an open command NARROWER
  # than the held object (e.g. 0.06 vs the 0.077m demo box) drives the jaws
  # INWARD — the SDK's open ramp targets the commanded angle — so it squeezes
  # instead of releasing and the object is never let go.
  open_gripper:
    description: >-
      Open the gripper / release. Triggers: "open gripper", "release",
      "let go".
    frames:
      - joints: {gripper: 0.100}
        delay: 1.0

  # Grasp at 0.2 N·m (no arm motion — pose fields omitted on purpose).
  # Validated on hardware: grasp(force=0.2) drove the close (torque rose to
  # ~1.84 N·m at the closed position). Use a larger |force| for a firmer hold.
  close_gripper:
    description: >-
      Close the gripper / grasp. Triggers: "close gripper", "grasp", "grab".
    frames:
      - joints: {gripper: -0.2}
        delay: 1.0

  # Wave: oscillate the TCP left↔right (±0.10 m in y at z=0.28) about home,
  # then return. All 6 waypoints IK-validated on hardware.
  wave:
    description: >-
      Wave hello by swinging the arm side to side. Triggers: "wave", "say hi".
    frames:
      - joints: {x: 0.27, y:  0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 0.4
      - joints: {x: 0.25, y:  0.10, z: 0.28, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 0.4
      - joints: {x: 0.25, y: -0.10, z: 0.28, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 0.4
      - joints: {x: 0.25, y:  0.10, z: 0.28, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 0.4
      - joints: {x: 0.25, y: -0.10, z: 0.28, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 0.4
      - joints: {x: 0.27, y:  0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.0

  # NOTE: put_down is NOT a static sequence any more. It moved to GraspPlugin
  # (grasp_plugin.py) as a semantic tool: it replays the last grasp's recorded
  # (IK-validated) pregrasp/grasp poses so the object is placed BACK at the
  # spot the camera picked it from — a fixed place spot here left the object
  # outside the camera's view and the next grasp_object failed. It also opens
  # to the grasp's auto-widened jaw width (a fixed 0.06 cannot release the
  # 0.077m demo box).

  # Point forward at an object, then return home. Both waypoints IK-validated
  # (point reach x=0.32 gave the lowest IK error, 7.3e-5).
  point_at:
    description: >-
      Point forward at an object. Triggers: "point at", "point", "show me".
      Do not use for head nodding: "nod" is unsupported.
    frames:
      - joints: {x: 0.32, y: 0.00, z: 0.20, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 2.0

  # DOF test: move UP then back home
  test_z_up:
    description: Test Z axis - move up
    frames:
      - joints: {x: 0.27, y: 0.00, z: 0.32, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5

  # DOF test: move forward/back (x axis)
  test_x_fwd:
    description: Test X axis - move forward and back
    frames:
      - joints: {x: 0.33, y: 0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5

  # DOF test: move left/right (y axis)
  test_y_side:
    description: Test Y axis - move left and right
    frames:
      - joints: {x: 0.27, y:  0.12, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: -0.12, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y:  0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5

  # DOF test: roll rotation
  test_roll:
    description: Test roll rotation
    frames:
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll:  0.4, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: -0.4, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll:  0.0, pitch: 0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5

  # DOF test: pitch rotation
  test_pitch:
    description: Test pitch rotation
    frames:
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch:  0.4, yaw: 0.0, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch: -0.4, yaw: 0.0, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch:  0.0, yaw: 0.0, gripper: 0.0}
        delay: 1.5

  # DOF test: yaw rotation
  test_yaw:
    description: Test yaw rotation
    frames:
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw:  0.4, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw: -0.4, gripper: 0.0}
        delay: 1.5
      - joints: {x: 0.27, y: 0.00, z: 0.24, roll: 0.0, pitch: 0.0, yaw:  0.0, gripper: 0.0}
        delay: 1.5
