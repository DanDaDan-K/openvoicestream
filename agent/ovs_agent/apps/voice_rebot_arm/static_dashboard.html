<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>reBot Arm Dashboard</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #14171c; color: #d8dee6;
         font: 14px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; align-items: center; gap: 12px;
           padding: 10px 16px; background: #1b2027; border-bottom: 1px solid #2a313b; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .pill { padding: 2px 10px; border-radius: 999px; font-size: 12px;
          background: #2a313b; }
  .pill.busy { background: #7a4a12; color: #ffd9a0; }
  .pill.idle { background: #1d4a2a; color: #a8f0bc; }
  #langBtn { margin-left: auto; cursor: pointer; border: 1px solid #2a313b;
             color: #d8dee6; }
  #langBtn:hover { background: #2a313b; }
  .grid { display: grid; gap: 12px; padding: 12px 16px;
          grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); }
  .card { background: #1b2027; border: 1px solid #2a313b; border-radius: 10px;
          padding: 12px; }
  .card h2 { font-size: 13px; margin: 0 0 8px; color: #8b96a5;
             text-transform: uppercase; letter-spacing: .06em; }
  .frames { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .frames img { width: 100%; border-radius: 6px; background: #000;
                min-height: 120px; object-fit: contain; }
  .frames .cap { font-size: 11px; color: #8b96a5; text-align: center; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  td, th { padding: 3px 6px; border-bottom: 1px solid #242b34; text-align: left; }
  th { color: #8b96a5; font-weight: 500; }
  td.num { font-variant-numeric: tabular-nums; text-align: right; }
  .ev { margin: 0; padding: 0; list-style: none; max-height: 260px; overflow-y: auto; }
  .ev li { padding: 5px 6px; border-bottom: 1px solid #242b34; font-size: 12.5px; }
  .ev .ok { color: #7ee2a0; } .ev .fail { color: #f2918c; }
  .ev .t { color: #707c8c; font-size: 11px; margin-right: 6px; }
  .bars { display: flex; height: 14px; border-radius: 4px; overflow: hidden;
          margin-top: 4px; }
  .bars div { font-size: 9px; line-height: 14px; padding: 0 3px; overflow: hidden;
              white-space: nowrap; color: #10131a; }
  svg { width: 100%; background: #10131a; border-radius: 6px; }
  .muted { color: #707c8c; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 999px;
           font-size: 11px; background: #2a313b; color: #8b96a5; }
  .badge.ok { background: #1d4a2a; color: #a8f0bc; }
  .badge.down { background: #4a1d1d; color: #f2918c; }
  .badge.warn { background: #7a4a12; color: #ffd9a0; }
  td.mname { font-variant-numeric: tabular-nums; color: #d8dee6; }
</style>
</head>
<body>
<header>
  <h1>reBot B601-DM</h1>
  <span id="busyPill" class="pill idle"></span>
  <span id="frameAge" class="pill"></span>
  <span id="conn" class="pill"></span>
  <button id="langBtn" class="pill" onclick="toggleLang()"></button>
</header>
<div class="grid">
  <div class="card" style="grid-column: 1 / -1;">
    <h2 data-i18n="cam_card"></h2>
    <div class="frames">
      <div><img id="imgColor" alt="annotated"><div class="cap" id="capColor" data-i18n="cap_color"></div></div>
      <div><img id="imgDepth" alt="depth"><div class="cap" data-i18n="cap_depth"></div></div>
    </div>
    <table id="detTable" style="margin-top:8px;"></table>
  </div>
  <div class="card">
    <h2 data-i18n="models_card"></h2>
    <table id="modelsTable"><tr><td class="muted" data-i18n="models_wait"></td></tr></table>
  </div>
  <div class="card">
    <h2 data-i18n="arm_card"></h2>
    <table id="armTable"><tr><td class="muted" data-i18n="arm_wait"></td></tr></table>
  </div>
  <div class="card">
    <h2 data-i18n="timeline_card"></h2>
    <ul class="ev" id="events"><li class="muted" data-i18n="no_events"></li></ul>
  </div>
  <div class="card">
    <h2 data-i18n="topdown_card"></h2>
    <svg id="topdown" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="muted" data-i18n="topdown_legend" style="font-size:11px;margin-top:4px;"></div>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
let lastSeq = -1;

// ── i18n ────────────────────────────────────────────────────────────────
// Default English (final demo language); a header toggle switches to 中文 and
// the choice persists in localStorage. Every user-facing string lives here.
const I18N = {
  en: {
    _label: "中文",
    cam_card: "Camera — decision frame / idle viewfinder",
    cap_color: "Annotated color",
    cap_depth: "Depth (pseudo-color; black = no return)",
    models_card: "Models — pipeline status",
    models_wait: "Waiting for data…",
    model_llm: "LLM",
    model_asr: "ASR",
    model_tts: "TTS",
    model_slv: "SLV link",
    st_ok: "ok",
    st_down: "down",
    st_reconnecting: "reconnecting",
    st_unknown: "unknown",
    arm_card: "Arm state",
    arm_wait: "Waiting for data…",
    timeline_card: "Action timeline",
    no_events: "No events yet",
    topdown_card: "Tabletop top-down — place_bounds",
    topdown_legend: "Green box = safe place zone (before margin inset), red dot = arm base, blue dot = latest place point (orange = original clamped point)",
    idle: "idle",
    no_frames: "no frames",
    connecting: "connecting…",
    connected: "connected",
    disconnected: "disconnected",
    busy_prefix: "running: ",
    obs_unreachable: "observation server unreachable",
    det_stage: "stage",
    det_count: "detections",
    det_methodwidth: "method/width",
    frame_live: "frame: live",
    frame_ago_prefix: "frame: ",
    frame_ago_suffix: "s ago",
    place_clamped: "⚠ place point clamped",
  },
  zh: {
    _label: "EN",
    cam_card: "相机 — 决策帧 / 空闲取景",
    cap_color: "标注彩图",
    cap_depth: "深度伪彩（黑=无返回）",
    models_card: "模型 — 流水线状态",
    models_wait: "等待数据…",
    model_llm: "LLM",
    model_asr: "ASR",
    model_tts: "TTS",
    model_slv: "SLV 连接",
    st_ok: "正常",
    st_down: "断开",
    st_reconnecting: "重连中",
    st_unknown: "未知",
    arm_card: "机械臂状态",
    arm_wait: "等待数据…",
    timeline_card: "动作时间线",
    no_events: "暂无事件",
    topdown_card: "桌面俯视 — place_bounds",
    topdown_legend: "绿框=安全放置区（margin 内收前），红点=臂基座，蓝点=最近放置点（橙=被 clamp 的原始点）",
    idle: "idle",
    no_frames: "无帧",
    connecting: "连接中…",
    connected: "已连接",
    disconnected: "连接断开",
    busy_prefix: "执行中: ",
    obs_unreachable: "observation server 不可达",
    det_stage: "阶段",
    det_count: "检出",
    det_methodwidth: "方法/宽",
    frame_live: "帧: 实时",
    frame_ago_prefix: "帧: ",
    frame_ago_suffix: "s 前",
    place_clamped: "⚠ 放置点被 clamp",
  },
};
let lang = localStorage.getItem("rebot_lang") || "en";
const t = k => (I18N[lang] && I18N[lang][k]) || (I18N.en[k] || k);

function applyI18n() {
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  $("langBtn").textContent = t("_label");
  lastSeq = -1;  // force frame caption + detection table to re-render in new lang
  tick();
}

function toggleLang() {
  lang = (lang === "en") ? "zh" : "en";
  localStorage.setItem("rebot_lang", lang);
  applyI18n();
}

const STAGE_COLORS = ["#7ee2a0","#7ec3e2","#e2d27e","#e29a7e","#c87ee2","#7e8ce2","#e27ea8"];

function fmt(v) {
  return (typeof v === "number") ? (Math.abs(v) < 1000 ? v.toFixed(3) : v.toFixed(0)) : String(v);
}

function renderArm(arm) {
  const t_ = $("armTable");
  if (!arm) { t_.innerHTML = `<tr><td class="muted">${t("obs_unreachable")}</td></tr>`; return; }
  const keys = Object.keys(arm);
  const pri = k => (/tcp|grip|pose/.test(k) ? 0 : /joint|pos/.test(k) ? 1 : 2);
  keys.sort((a,b) => pri(a)-pri(b) || a.localeCompare(b));
  t_.innerHTML = keys.map(k =>
    `<tr><th>${k}</th><td class="num">${fmt(arm[k])}</td></tr>`).join("");
}

function badge(ok, reconnecting) {
  // ok===true → green, reconnecting → amber, ok===false → red, null → unknown.
  if (reconnecting) return `<span class="badge warn">${t("st_reconnecting")}</span>`;
  if (ok === true) return `<span class="badge ok">${t("st_ok")}</span>`;
  if (ok === false) return `<span class="badge down">${t("st_down")}</span>`;
  return `<span class="badge">${t("st_unknown")}</span>`;
}

function renderModels(models) {
  const t_ = $("modelsTable");
  if (!models) {  // older backend without the models block — degrade gracefully
    t_.innerHTML = `<tr><td class="muted">${t("models_wait")}</td></tr>`;
    return;
  }
  const row = (label, nameHtml, ok, reconnecting) =>
    `<tr><th>${label}</th><td class="mname">${nameHtml || "—"}</td>`
    + `<td style="text-align:right">${badge(ok, reconnecting)}</td></tr>`;
  let html = "";
  if (models.llm) {
    const ep = models.llm.endpoint
      ? ` <span class="muted" style="font-size:11px">${models.llm.endpoint}</span>` : "";
    html += row(t("model_llm"), (models.llm.name || "—") + ep, models.llm.ok);
  }
  if (models.asr) html += row(t("model_asr"), models.asr.name, models.asr.ok);
  if (models.tts) html += row(t("model_tts"), models.tts.name, models.tts.ok);
  if (models.slv) html += row(t("model_slv"), "", models.slv.ok, models.slv.reconnecting);
  t_.innerHTML = html || `<tr><td class="muted">${t("models_wait")}</td></tr>`;
}

function renderDets(meta) {
  const t_ = $("detTable");
  if (!meta) { t_.innerHTML = ""; return; }
  let rows = `<tr><th>${t("det_stage")}</th><td>${meta.stage}</td><th>${t("det_count")}</th><td>${(meta.detections||[]).length}</td></tr>`;
  (meta.detections||[]).forEach(d => {
    rows += `<tr><th>· ${d.class}</th><td class="num">${d.conf}</td><td></td><td></td></tr>`;
  });
  if (meta.best) {
    const b = meta.best;
    rows += `<tr><th>best</th><td>${b.class} ${b.conf}</td><th>${t("det_methodwidth")}</th><td>${b.method} / ${b.jaw_width_m}m</td></tr>`;
  }
  t_.innerHTML = rows;
}

function renderEvents(events) {
  const ul = $("events");
  if (!events || !events.length) return;
  ul.innerHTML = events.slice().reverse().map(e => {
    const ok = e.success || e.found;
    const time = new Date(e.ts*1000).toLocaleTimeString();
    let bars = "";
    if (e.stage_ms) {
      const total = Object.values(e.stage_ms).reduce((a,b)=>a+b,0) || 1;
      let i = 0;
      bars = '<div class="bars">' + Object.entries(e.stage_ms).map(([k,v]) =>
        `<div style="width:${Math.max(2,100*v/total)}%;background:${STAGE_COLORS[i++%STAGE_COLORS.length]}" title="${k} ${v}ms">${k}</div>`
      ).join("") + "</div>";
    }
    const extra = e.error ? ` <span class="fail">${e.error}</span>` :
      (e.place_clamped ? ` <span class="fail">${t("place_clamped")}</span>` : "");
    return `<li><span class="t">${time}</span><span class="${ok?"ok":"fail"}">`
      + `${e.kind} ${ok?"✓":"✗"}</span>${extra}${bars}</li>`;
  }).join("");
}

function renderTopdown(bounds, events) {
  const svg = $("topdown");
  // world → svg: x(0..0.8m) downward→up, y(-0.45..0.45) → left-right
  const W=100, H=100, X0=0.0, X1=0.80, Y0=-0.45, Y1=0.45;
  const px = (x,y) => [ (y-Y0)/(Y1-Y0)*W, H - (x-X0)/(X1-X0)*H ];
  let s = "";
  if (bounds) {
    const [a,b] = px(bounds[1], bounds[2]), [c,d] = px(bounds[0], bounds[3]);
    s += `<rect x="${Math.min(a,c)}" y="${Math.min(b,d)}" width="${Math.abs(c-a)}" height="${Math.abs(d-b)}"
          fill="rgba(126,226,160,.12)" stroke="#7ee2a0" stroke-width="0.6"/>`;
  }
  const [bx,by] = px(0,0);
  s += `<circle cx="${bx}" cy="${by}" r="2.2" fill="#f2918c"/>`;
  const lastPut = (events||[]).slice().reverse().find(e => e.placed_at);
  if (lastPut) {
    const [ux,uy] = px(lastPut.placed_at[0], lastPut.placed_at[1]);
    s += `<circle cx="${ux}" cy="${uy}" r="2" fill="#7ec3e2"/>`;
    if (lastPut.place_original) {
      const [ox,oy] = px(lastPut.place_original[0], lastPut.place_original[1]);
      s += `<circle cx="${ox}" cy="${oy}" r="1.6" fill="#e2a35e"/>
            <line x1="${ox}" y1="${oy}" x2="${ux}" y2="${uy}" stroke="#e2a35e"
              stroke-width="0.5" stroke-dasharray="2 1"/>`;
    }
  }
  svg.innerHTML = s;
}

async function tick() {
  try {
    const r = await fetch("/api/state", {cache: "no-store"});
    const st = await r.json();
    $("conn").textContent = t("connected");
    const busy = st.busy;
    $("busyPill").textContent = busy ? `${t("busy_prefix")}${busy}` : t("idle");
    $("busyPill").className = "pill " + (busy ? "busy" : "idle");
    renderArm(st.arm);
    renderModels(st.models);
    renderEvents(st.events);
    renderTopdown(st.place_bounds, st.events);
    if (st.frame_seq !== lastSeq && st.frame_meta) {
      lastSeq = st.frame_seq;
      $("imgColor").src = "/api/frame.jpg?s=" + lastSeq;
      $("imgDepth").src = "/api/depth.jpg?s=" + lastSeq;
      $("capColor").textContent = `${t("cap_color")} — ${st.frame_meta.stage} (#${lastSeq})`;
      renderDets(st.frame_meta);
    }
    if (st.frame_meta) {
      const age = Math.max(0, Date.now()/1000 - st.frame_meta.ts);
      $("frameAge").textContent = age < 5 ? t("frame_live")
        : `${t("frame_ago_prefix")}${age.toFixed(0)}${t("frame_ago_suffix")}`;
    }
  } catch (e) {
    $("conn").textContent = t("disconnected");
  }
}

// Initial paint: static strings + connecting/idle/no-frames placeholders.
$("conn").textContent = t("connecting");
$("busyPill").textContent = t("idle");
$("frameAge").textContent = t("no_frames");
applyI18n();
setInterval(tick, 1000);
</script>
</body>
</html>
