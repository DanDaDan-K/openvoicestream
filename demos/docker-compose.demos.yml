# SLV Demo Gallery — compose skeleton (P0).
#
# Usage:
#   docker compose -f demos/docker-compose.demos.yml --profile all up -d
#   docker compose -f demos/docker-compose.demos.yml --profile gallery up -d
#
# The gallery talks to the SLV server on the host (:8621) — override SLV_URL
# when SLV runs elsewhere. Dedicated per-demo images land in P3; for now the
# gallery runs from a bind-mounted source tree via uv.

services:
  gallery:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    container_name: slv-demo-gallery
    profiles: ["all", "gallery"]
    working_dir: /app
    command: uv run --frozen python -m uvicorn gallery.backend.main:app --host 0.0.0.0 --port 8700
    ports:
      - "8700:8700"
    environment:
      SLV_URL: ${SLV_URL:-http://host.docker.internal:8621}
      SLV_ADMIN_KEY: ${SLV_ADMIN_KEY:-}
      DEMO_PROFILES_DIR: /profiles
      DEMO_KIOSK: ${DEMO_KIOSK:-0}
      UV_CACHE_DIR: /tmp/uv-cache
    volumes:
      - .:/app
      - ../configs/profiles:/profiles:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

