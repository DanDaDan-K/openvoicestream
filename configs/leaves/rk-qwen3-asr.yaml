# Rockchip (RK3576 / RK3588) ASR leaves — Qwen3 ASR (RKNN encoder + RKLLM
# decoder) and Paraformer hybrid (RKNN encoder prefix + ONNX/RKNN decoder).
#
# Source of truth for file lists: deploy/artifacts/rk_manifest.json artifact_sets
#   * Qwen3 ASR:
#       rk3576-multilang-2026-05-17  (rk3576: w8a8 + w4a16_g128 rkllm decoders)
#       rk3588-multilang-2026-05-17  (rk3588: fp16 + w8a8 rkllm decoders)
#   * Paraformer hybrid:
#       rk3576-paraformer-hybrid-rknn-decoder-2026-06-09
#       rk3588-paraformer-hybrid-rknn-decoder-2026-06-09
# Env keys from configs/profiles/rk3576-w8a8-probe.json,
# rk3576-w4a16g128-probe.json, rk{3576,3588}-paraformer-hybrid-rknn-decoder-matcha.json
# and the manifest runtime_contract.env blocks.
#
# The manifest paths are root-relative (root "/"); we list them rooted under
# opt/... exactly as the manifest does. The shared embd tensor
# (decoder_hf.embed_tokens.npy) and tokenizer/mel/vad are identical across the
# Qwen3 quant variants on a SoC → a per-SoC shared sub-leaf carries them once.
#
# Backend family: rk.* + LANGUAGE_MODE=rk. The validator's family-coupling check
# rejects pairing any of these with a jetson.* / cpu.sherpa leaf.
# resources.exclusive: npu — the RK NPU is one shared accelerator; two NPU leaves
# on the same device require composition-level admission: serial.
#
# All N=1: RKLLM decoder + RKNN encoder are single-context on the RK NPU.
# precision: Qwen3 ASR resolves via models.yaml → qwen3-asr-rk (rk -> w8a8 default);
# the w4a16g128 leaf pins precision explicitly. Paraformer leaves resolve via
# paraformer-streaming (rk -> fp16).

leaves:
  # --- shared Qwen3-ASR decode assets per SoC (tokenizer/mel/vad/embd) ---
  asr.qwen3_asr_rk.rk3576.shared:
    capability: asr
    backend: rk.qwen3_asr_rk
    device: rk3576
    model: qwen3-asr-rk
    artifacts:
      repo: harvestsu/seeed-local-voice-rk-artifacts
      files:
        - opt/asr/models/tokenizer/tokenizer.json
        - opt/asr/models/mel_filters.npy
        - opt/asr/models/embd/decoder_hf.embed_tokens.npy
        - opt/asr/models/vad/silero_vad.onnx

  asr.qwen3_asr_rk.rk3588.shared:
    capability: asr
    backend: rk.qwen3_asr_rk
    device: rk3588
    model: qwen3-asr-rk
    artifacts:
      repo: harvestsu/seeed-local-voice-rk-artifacts
      files:
        - opt/asr/models/tokenizer/tokenizer.json
        - opt/asr/models/mel_filters.npy
        - opt/asr/models/embd/decoder_hf.embed_tokens.npy
        - opt/asr/models/vad/silero_vad.onnx

  # --- RK3576 Qwen3 ASR, W8A8 RKLLM decoder (default quant) ---
  asr.qwen3_asr_rk.rk3576.w8a8:
    capability: asr
    backend: rk.qwen3_asr_rk
    device: rk3576
    concurrency: 1
    model: qwen3-asr-rk
    # precision unset → models.yaml qwen3-asr-rk default (rk -> w8a8)
    requires:
      - asr.qwen3_asr_rk.rk3576.shared
    artifacts:
      repo: harvestsu/seeed-local-voice-rk-artifacts
      files:
        # encoder buckets (4s + 2s) + w8a8 decoder; from rk3576-multilang set.
        - opt/asr/models/encoder/rk3576/qwen3_asr_encoder_merged.fp16.4s.rk3576.rknn
        - opt/asr/models/encoder/rk3576/qwen3_asr_encoder_merged.fp16.2s.rk3576.rknn
        - opt/asr/models/rkllm/decoder_qwen3.w8a8.rk3576.rkllm
    runtime_env:
      LANGUAGE_MODE: rk
      RK_PLATFORM: rk3576
      RK_ARTIFACT_SET: rk3576-multilang-2026-05-17
      ASR_BACKEND: qwen3_asr_rk
      ASR_DECODER_TYPE: rkllm
      ASR_DECODER_QUANT: w8a8
      ASR_MODEL_DIR: /opt/asr/models
      RKLLM_LIB_PATH: /opt/asr/lib/librkllmrt.so
    resources:
      exclusive: npu
      peak_unified_mb: 2200  # TBD-measure (placeholder; w8a8 rkllm ~945MB on disk)

  # --- RK3576 Qwen3 ASR, W4A16_G128 RKLLM decoder (smaller, A/B variant) ---
  asr.qwen3_asr_rk.rk3576.w4a16g128:
    capability: asr
    backend: rk.qwen3_asr_rk
    device: rk3576
    concurrency: 1
    model: qwen3-asr-rk
    precision: w4a16_g128  # explicit pin (overrides the rk default)
    requires:
      - asr.qwen3_asr_rk.rk3576.shared
    artifacts:
      repo: harvestsu/seeed-local-voice-rk-artifacts
      files:
        - opt/asr/models/encoder/rk3576/qwen3_asr_encoder_merged.fp16.4s.rk3576.rknn
        - opt/asr/models/encoder/rk3576/qwen3_asr_encoder_merged.fp16.2s.rk3576.rknn
        - opt/asr/models/rkllm/decoder_qwen3.w4a16_g128.rk3576.rkllm
    runtime_env:
      LANGUAGE_MODE: rk
      RK_PLATFORM: rk3576
      RK_ARTIFACT_SET: rk3576-multilang-2026-05-17
      ASR_BACKEND: qwen3_asr_rk
      ASR_DECODER_TYPE: rkllm
      ASR_DECODER_QUANT: w4a16_g128
      ASR_MODEL_DIR: /opt/asr/models
      RKLLM_LIB_PATH: /opt/asr/lib/librkllmrt.so
    resources:
      exclusive: npu
      peak_unified_mb: 1900  # TBD-measure (placeholder; w4a16 rkllm ~795MB on disk)

  # --- RK3588 Qwen3 ASR, W8A8 RKLLM decoder ---
  asr.qwen3_asr_rk.rk3588.w8a8:
    capability: asr
    backend: rk.qwen3_asr_rk
    device: rk3588
    concurrency: 1
    model: qwen3-asr-rk
    requires:
      - asr.qwen3_asr_rk.rk3588.shared
    artifacts:
      repo: harvestsu/seeed-local-voice-rk-artifacts
      files:
        # rk3588-multilang set has 15s + 4s + 2s encoder buckets + w8a8 decoder.
        - opt/asr/models/encoder/rk3588/qwen3_asr_encoder_merged.fp16.15s.rk3588.rknn
        - opt/asr/models/encoder/rk3588/qwen3_asr_encoder_merged.fp16.4s.rk3588.rknn
        - opt/asr/models/encoder/rk3588/qwen3_asr_encoder_merged.fp16.2s.rk3588.rknn
        - opt/asr/models/decoder/decoder_qwen3.w8a8.rk3588.rkllm
    runtime_env:
      LANGUAGE_MODE: rk
      RK_PLATFORM: rk3588
      RK_ARTIFACT_SET: rk3588-multilang-2026-05-17
      ASR_BACKEND: qwen3_asr_rk
      ASR_DECODER_TYPE: rkllm
      ASR_DECODER_QUANT: w8a8
      ASR_MODEL_DIR: /opt/asr/models
      RKLLM_LIB_PATH: /opt/asr/lib/librkllmrt.so
    resources:
      exclusive: npu
      peak_unified_mb: 2200  # TBD-measure (placeholder)

  # --- RK3576 Paraformer hybrid (RKNN encoder prefix + RKNN decoder) ---
  # ALL bucketed encoder_prefix_to_block30.*.fp16.rknn are listed (40/80/160/
  # 240/400) per the hybrid set: the runtime picks the bucket by utterance
  # length, so every bucket must be provisioned.
  asr.paraformer_rknn.rk3576.hybrid:
    capability: asr
    backend: rk.paraformer_rknn
    device: rk3576
    concurrency: 1
    model: paraformer-streaming
    artifacts:
      repo: harvestsu/seeed-local-voice-rk-artifacts
      files:
        - opt/asr/paraformer/tokens.txt
        - opt/asr/paraformer/encoder_suffix_from_block30.onnx
        - opt/asr/paraformer/decoder-rknn.onnx
        - opt/asr/paraformer/rknn/rk3576/encoder_prefix_to_block30.40.fp16.rknn
        - opt/asr/paraformer/rknn/rk3576/encoder_prefix_to_block30.80.fp16.rknn
        - opt/asr/paraformer/rknn/rk3576/encoder_prefix_to_block30.160.fp16.rknn
        - opt/asr/paraformer/rknn/rk3576/encoder_prefix_to_block30.240.fp16.rknn
        - opt/asr/paraformer/rknn/rk3576/encoder_prefix_to_block30.400.fp16.rknn
        - opt/asr/paraformer/rknn/rk3576/decoder.400x40.fp16.rknn
    runtime_env:
      LANGUAGE_MODE: rk
      RK_PLATFORM: rk3576
      RK_ARTIFACT_SET: rk3576-paraformer-hybrid-rknn-decoder-2026-06-09
      ASR_BACKEND: paraformer_rknn
      PARAFORMER_MODEL_DIR: /opt/asr/paraformer
      PARAFORMER_RKNN_DIR: /opt/asr/paraformer/rknn/rk3576
      PARAFORMER_RKNN_ENCODER_MODE: hybrid
      PARAFORMER_RKNN_DECODER: rknn
      PARAFORMER_ENCODER_SUFFIX_ONNX: /opt/asr/paraformer/encoder_suffix_from_block30.onnx
    resources:
      exclusive: npu
      peak_unified_mb: 1800  # TBD-measure (placeholder)

  # --- RK3576 Paraformer FULL encoder mode (experimental A/B vs hybrid) ---
  # ENCODER_MODE=full: the whole encoder runs on the NPU as bucketed full-encoder
  # RKNNs (encoder.{frames}.fp16.rknn — glob "encoder.*.rknn" in the backend,
  # rkvoice_stream/backends/asr/paraformer_rknn.py:_load_full_encoder), NOT the
  # hybrid prefix-to-block30 buckets + CPU/ONNX encoder suffix. So there is NO
  # encoder_suffix_from_block30.onnx and NO decoder-rknn.onnx here — only the
  # full-encoder buckets + the RKNN decoder + tokens (decoder/tokens are the same
  # artifacts the hybrid leaf uses).
  #
  # File list source of truth: docs/perf/paraformer-rk3576-streaming-ab-20260608.md
  # lines 72-73 — the rk3576-paraformer-full-rknn-matcha profile "successfully
  # loaded full encoder buckets encoder.{40,80,160,400}.fp16.rknn and RKNN
  # decoder". Bucket set is {40,80,160,400} (NOT the hybrid 40/80/160/240/400).
  # Decoder filename = decoder.400x40.fp16.rknn (DEC_MAX_ENC_FRAMES x DEC_MAX_TOKENS,
  # same as hybrid). Env from configs/profiles/rk3576-paraformer-full-rknn-matcha.json.
  #
  # repo "": these full-encoder RKNNs are NOT in deploy/artifacts/rk_manifest.json
  # (the manifest only carries the *hybrid* paraformer sets). They are an
  # experimental artifact set, generated/validated ad-hoc on cat-remote.
  # TODO: this full-encoder RKNN is documented as NOT safe to use on RK3576
  #   without reconversion/graph repair (same AB doc lines 74-78: warmup produced
  #   invalid output; a 40-frame probe showed non-finite values inside real audio
  #   frames). When a packaged, repaired full-encoder set ships, add it to
  #   rk_manifest.json (with sha256/size) and switch repo "" → the RK artifacts
  #   repo, mirroring the hybrid leaf.
  asr.paraformer_rknn.rk3576.full:
    capability: asr
    backend: rk.paraformer_rknn
    device: rk3576
    concurrency: 1
    model: paraformer-streaming
    artifacts:
      repo: ""  # experimental full-encoder set; not in rk_manifest.json (see TODO)
      files:
        - opt/asr/paraformer/tokens.txt
        - opt/asr/paraformer/rknn/rk3576/encoder.40.fp16.rknn
        - opt/asr/paraformer/rknn/rk3576/encoder.80.fp16.rknn
        - opt/asr/paraformer/rknn/rk3576/encoder.160.fp16.rknn
        - opt/asr/paraformer/rknn/rk3576/encoder.400.fp16.rknn
        - opt/asr/paraformer/rknn/rk3576/decoder.400x40.fp16.rknn
    runtime_env:
      LANGUAGE_MODE: rk
      RK_PLATFORM: rk3576
      ASR_BACKEND: paraformer_rknn
      PARAFORMER_MODEL_DIR: /opt/asr/paraformer
      PARAFORMER_RKNN_DIR: /opt/asr/paraformer/rknn/rk3576
      PARAFORMER_RKNN_ENCODER_MODE: full
      PARAFORMER_RKNN_DECODER: rknn
      PARAFORMER_RKNN_ENC_PRECISION: fp16
      PARAFORMER_RKNN_DEC_PRECISION: fp16
      PARAFORMER_FBANK_CMVN: none
      PARAFORMER_STREAM_DECODE: batch_final
      PARAFORMER_STREAM_PROCESS_SEC: "2.0"
      PARAFORMER_RKNN_ENC_CORE: NPU_CORE_1
      PARAFORMER_RKNN_DEC_CORE: NPU_CORE_2
    resources:
      exclusive: npu
      peak_unified_mb: 1800  # TBD-measure (placeholder; similar to hybrid)

  # --- RK3588 Paraformer hybrid ---
  asr.paraformer_rknn.rk3588.hybrid:
    capability: asr
    backend: rk.paraformer_rknn
    device: rk3588
    concurrency: 1
    model: paraformer-streaming
    artifacts:
      repo: harvestsu/seeed-local-voice-rk-artifacts
      files:
        - opt/asr/paraformer/tokens.txt
        - opt/asr/paraformer/encoder_suffix_from_block30.onnx
        - opt/asr/paraformer/decoder-rknn.onnx
        - opt/asr/paraformer/rknn/rk3588/encoder_prefix_to_block30.40.fp16.rknn
        - opt/asr/paraformer/rknn/rk3588/encoder_prefix_to_block30.80.fp16.rknn
        - opt/asr/paraformer/rknn/rk3588/encoder_prefix_to_block30.160.fp16.rknn
        - opt/asr/paraformer/rknn/rk3588/encoder_prefix_to_block30.240.fp16.rknn
        - opt/asr/paraformer/rknn/rk3588/encoder_prefix_to_block30.400.fp16.rknn
        - opt/asr/paraformer/rknn/rk3588/decoder.400x40.fp16.rknn
    runtime_env:
      LANGUAGE_MODE: rk
      RK_PLATFORM: rk3588
      RK_ARTIFACT_SET: rk3588-paraformer-hybrid-rknn-decoder-2026-06-09
      ASR_BACKEND: paraformer_rknn
      PARAFORMER_MODEL_DIR: /opt/asr/paraformer
      PARAFORMER_RKNN_DIR: /opt/asr/paraformer/rknn/rk3588
      PARAFORMER_RKNN_ENCODER_MODE: hybrid
      PARAFORMER_RKNN_DECODER: rknn
      PARAFORMER_ENCODER_SUFFIX_ONNX: /opt/asr/paraformer/encoder_suffix_from_block30.onnx
    resources:
      exclusive: npu
      peak_unified_mb: 1800  # TBD-measure (placeholder)
