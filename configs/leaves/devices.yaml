# Device registry: unified-memory budget + recommended default combo per class.
#
# `default` is the per-device recommended leaf for each capability. The
# composition validator rejects combos where
#   base_reservation_mb + sum(selected leaf DELTA peak_unified_mb)
#   exceeds `unified_mb * headroom` (default headroom 0.85).
#
# `base_reservation_mb` is the non-leaf resident floor: the idle voice-stack-
# absent baseline (translator + system + other-resident services) that every
# composition pays once. Leaf `peak_unified_mb` values are DELTAS over THIS
# baseline (see qwen3-asr-nx.yaml / qwen3-tts-nx.yaml), so the baseline is
# counted once here instead of being double-counted inside each leaf's peak.
# 4400 MB measured/observed on both Orin devices (orin-nx 2026-06-12).
#
# `device_class` drives precision resolution (models.yaml default_precision is
# keyed by class). Both Orin devices are class `jetson`.

devices:
  orin-nx:
    unified_mb: 15656
    base_reservation_mb: 4400
    device_class: jetson
    default:
      asr: asr.qwen3_asr.orin-nx.n2
      tts: tts.qwen3_tts.orin-nx.n1

  orin-nano:
    unified_mb: 7864
    base_reservation_mb: 4400
    device_class: jetson
    default:
      asr: asr.qwen3_asr.orin-nx.n2
      tts: tts.qwen3_tts.orin-nx.n1

  # --- additional device classes for the adapted RK / RPi / Mac backends ---
  # All TBD-measure: total_mb is the SoC nameplate; base_reservation_mb is a
  # starting estimate (codex design pass) for the non-leaf resident floor. These
  # MUST be measured on real hardware before the validator memory math can be
  # trusted for compositions on these devices (the leaf peak_unified_mb values
  # are likewise placeholders — see the per-leaf comments).

  # Jetson AGX Orin (64 GB class). Added so the AGX is in the registry; reuses
  # the orin Qwen3 defaults. TBD-measure base_reservation.
  agx-orin:
    unified_mb: 65536
    base_reservation_mb: 4400  # TBD-measure
    device_class: jetson
    default:
      asr: asr.qwen3_asr.orin-nx.n2
      tts: tts.qwen3_tts.orin-nx.n1

  rk3576:
    unified_mb: 8192          # TBD-measure (SoC nameplate)
    base_reservation_mb: 1536  # TBD-measure
    device_class: rk
    default:
      asr: asr.qwen3_asr_rk.rk3576.w8a8
      tts: tts.matcha_rknn.rk3576.n1

  rk3588:
    unified_mb: 8192          # TBD-measure
    base_reservation_mb: 1536  # TBD-measure
    device_class: rk
    default:
      asr: asr.qwen3_asr_rk.rk3588.w8a8
      tts: tts.matcha_rknn.rk3588.n1

  rpi4:
    unified_mb: 4096          # TBD-measure
    base_reservation_mb: 768   # TBD-measure
    device_class: rpi
    default:
      asr: asr.sensevoice_sherpa.rpi4.n4
      tts: tts.matcha_sherpa.rpi4.n4

  rpi5:
    unified_mb: 8192          # TBD-measure
    base_reservation_mb: 1024  # TBD-measure
    device_class: rpi
    default:
      asr: asr.sensevoice_sherpa.rpi5.n4
      tts: tts.matcha_sherpa.rpi5.n4

  mac-cpu:
    unified_mb: 16384         # TBD-measure
    base_reservation_mb: 4096  # TBD-measure
    device_class: mac
    default:
      asr: asr.sensevoice_sherpa.mac.n4
      tts: tts.matcha_sherpa.mac.n4
